  core: "chunks/core.md"
  full: "chunks/full.md"
quality:
  overall: 4
relations:
  - { type: related, target: "@android-compose/rule-touch-target-48dp" }
  - { type: related, target: "@android-compose/rule-semantic-tree-via-modifier-semantics" }
