id: "@android-compose/rule-color-roles-not-raw-hex"
kind: rule
version: "0.1.0"
description: "Material 3 defines 30+ semantic color *roles* — `primary`, `onPrimary`, `surface`, `onSurfaceVariant`, `error`, `outline`, etc. — exposed in Compose as `MaterialTheme.colorScheme.<role>`. Components and screens reference roles. The role-to-hex mapping lives in the theme and changes between light/dark, dynamic-color (Material You), high-contrast, and per-app brand schemes. Hard-coding a hex value bypasses every one of those swaps and breaks the moment a user toggles dark mode or dynamic color."
domain: android-compose
content_hash: "sha256:070b87af429c036bbd64c5e7e5d2043b37e9370c0be54762a4eca67dc8ec5658"
tokens:
  summary: 140
  core: 326
  full: 343
projection:
  summary: "chunks/summary.md"
  core: "chunks/core.md"
  full: "chunks/full.md"
quality:
  overall: 4
relations:
  - { type: related, target: "@android-compose/rule-typography-scale-tokens" }
  - { type: related, target: "@android-compose/rule-elevation-tokens" }
  - { type: related, target: "@android-compose/rule-motion-easing-tokens" }
created_at: "2026-05-10"
